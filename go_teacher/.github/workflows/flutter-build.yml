name: Flutter Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download Flutter 3.25.3 manually
        run: |
          curl -L https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.25.3-stable.tar.xz -o flutter.tar.xz
          tar xf flutter.tar.xz
          echo "$(pwd)/flutter/bin" >> $GITHUB_PATH
          flutter --version

      - name: Install dependencies
        run: |
          cd go_teacher_flutter
          flutter pub get

      - name: Build APK (ARM64 only)
        run: |
          cd go_teacher_flutter
          flutter build apk --release --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-arm64
          path: go_teacher_flutter/build/app/outputs/flutter-apk/app-release.apk
