name: Build Android APK

on:
  push:
    branches:
      - master
    paths:
      - 'go_teacher_flutter/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go_teacher_flutter

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Flutter manually
        run: |
          curl -O https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.25.3-stable.tar.xz
          tar xf flutter_linux_3.25.3-stable.tar.xz
          echo "$(pwd)/flutter/bin" >> $GITHUB_PATH
          flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-teacher-apk
          path: go_teacher_flutter/build/app/outputs/flutter-apk/app-release.apk
